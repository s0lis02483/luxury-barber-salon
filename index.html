<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Barber Salon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold:      #C9A84C;
  --gold-lt:   #E4C97B;
  --black:     #0a0a0a;
  --dark:      #141414;
  --dark2:     #1a1a1a;
  --dark3:     #232323;
  --border:    #2a2a2a;
  --text:      #FAFAFA;
  --dim:       #888;
  --muted:     #555;
  --serif:     'Playfair Display', Georgia, serif;
  --sans:      'Inter', system-ui, sans-serif;
  --gold-grad: linear-gradient(135deg, #C9A84C 0%, #E4C97B 50%, #C9A84C 100%);
}
html { scroll-behavior: smooth; }
body { font-family: var(--sans); background: var(--black); color: var(--text); -webkit-font-smoothing: antialiased; overflow-x: hidden; }
::selection { background: rgba(201,168,76,.3); color: #fef9ee; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--black); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold); }

.label { font-size: 10px; letter-spacing: .35em; text-transform: uppercase; color: var(--gold); font-weight: 500; }
.serif { font-family: var(--serif); }

/* ── Buttons ── */
.btn-gold {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  background: var(--gold-grad); color: var(--black);
  font-family: var(--sans); font-size: 11px; font-weight: 600;
  letter-spacing: .2em; text-transform: uppercase;
  padding: 14px 32px; border: none; cursor: pointer;
  transition: filter .2s, opacity .2s; position: relative; white-space: nowrap;
}
.btn-gold:hover { filter: brightness(1.1); }
.btn-gold:active { filter: brightness(.93); }
.btn-gold:disabled { opacity: .45; cursor: not-allowed; }
.btn-ghost {
  display: inline-flex; align-items: center; gap: 6px;
  background: transparent; color: var(--muted);
  font-family: var(--sans); font-size: 10px; font-weight: 500;
  letter-spacing: .15em; text-transform: uppercase;
  padding: 8px 0; border: none; cursor: pointer; transition: color .2s;
}
.btn-ghost:hover { color: var(--gold); }
.btn-danger {
  display: inline-flex; align-items: center; justify-content: center;
  background: transparent; color: #f87171;
  font-family: var(--sans); font-size: 10px; font-weight: 500;
  letter-spacing: .12em; text-transform: uppercase;
  padding: 6px 14px; border: 1px solid rgba(248,113,113,.3); cursor: pointer;
  transition: all .2s;
}
.btn-danger:hover { background: rgba(248,113,113,.07); }

.spin {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid currentColor; border-top-color: transparent;
  border-radius: 50%; animation: spin .6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.gold-line { height: 1px; width: 48px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }

/* ── Language switch ── */
.lang-switch {
  display: flex; align-items: center; gap: 0;
  border: 1px solid rgba(201,168,76,.3); overflow: hidden;
}
.ls-btn {
  background: transparent; border: none;
  color: var(--muted); font-family: var(--sans); font-size: 10px;
  font-weight: 500; letter-spacing: .12em; text-transform: uppercase;
  padding: 6px 10px; cursor: pointer; transition: all .2s;
}
.ls-btn:hover { color: var(--gold); background: rgba(201,168,76,.06); }
.ls-btn.active { color: var(--black); background: var(--gold-grad); font-weight: 600; }
.ls-sep { color: rgba(201,168,76,.3); font-size: 11px; }

/* ── NAV ── */
#nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  height: 64px; padding: 0 40px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(10,10,10,.88); backdrop-filter: blur(14px);
  border-bottom: 1px solid rgba(255,255,255,.04);
}
.nav-logo {
  display: flex; align-items: center; gap: 10px;
  font-family: var(--serif); font-size: 15px; font-weight: 300; letter-spacing: .04em;
  color: var(--text); text-decoration: none;
}
.nav-logo .scissors { color: var(--gold); }
.nav-right { display: flex; align-items: center; gap: 16px; }
.nav-links { display: flex; align-items: center; gap: 28px; }
.nav-links button {
  font-size: 11px; font-family: var(--sans); letter-spacing: .14em;
  text-transform: uppercase; color: var(--dim); background: none;
  border: none; cursor: pointer; transition: color .2s;
}
.nav-links button:hover { color: var(--gold); }
@media (max-width: 768px) { #nav { padding: 0 20px; } .nav-links { display: none; } }

/* ── HERO ── */
#hero {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  text-align: center; padding: 100px 24px 80px; position: relative; overflow: hidden;
}
.hero-pattern {
  position: absolute; inset: 0; opacity: .03;
  background-image: repeating-linear-gradient(45deg,#C9A84C,#C9A84C 1px,transparent 1px,transparent 60px);
}
.hero-glow {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(201,168,76,.065) 0%, transparent 70%);
}
.hero-inner { position: relative; z-index: 2; max-width: 820px; animation: heroFade .9s ease forwards; }
@keyframes heroFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.hero-eyebrow { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 28px; }
.hero-line { height: 1px; width: 48px; background: linear-gradient(90deg, transparent, var(--gold)); }
.hero-line.r { background: linear-gradient(90deg, var(--gold), transparent); }
.hero-title {
  font-family: var(--serif); font-size: clamp(42px,7.5vw,74px);
  font-weight: 300; line-height: 1.08; color: var(--text); margin-bottom: 24px;
}
.hero-title em { font-style: italic; color: var(--gold); }
.hero-desc { font-size: 15px; line-height: 1.85; color: var(--dim); max-width: 480px; margin: 0 auto 40px; }
.hero-ctas { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-bottom: 56px; }
.hero-proof { display: flex; align-items: center; justify-content: center; gap: 18px; font-size: 12px; color: var(--muted); }
.hero-proof .sep { width: 1px; height: 12px; background: var(--border); }
.stars { color: var(--gold); }
.scroll-cue { position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 7px; opacity: .35; }
.scroll-cue span { font-size: 9px; letter-spacing: .3em; text-transform: uppercase; }
.scroll-cue-line { width: 1px; height: 44px; background: linear-gradient(to bottom,var(--dim),transparent); }

/* ── BOOKING SECTION ── */
#book { padding: 100px 40px; border-top: 1px solid var(--dark2); }
.book-layout { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1.3fr; gap: 80px; align-items: start; }
.book-info { position: sticky; top: 80px; }
.book-eyebrow { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
.book-eyebrow .bl { height: 1px; width: 28px; background: rgba(201,168,76,.6); }
.book-title { font-family: var(--serif); font-size: clamp(30px,5vw,48px); font-weight: 300; line-height: 1.15; margin-bottom: 20px; }
.book-title em { font-style: italic; color: var(--gold); }
.book-desc { font-size: 13px; line-height: 1.9; color: var(--dim); max-width: 310px; margin-bottom: 36px; }
.book-meta { border-top: 1px solid var(--dark2); padding-top: 28px; display: flex; flex-direction: column; gap: 14px; }
.book-meta-row { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--dim); }
.book-meta-row svg { color: rgba(201,168,76,.5); flex-shrink: 0; }
@media (max-width: 900px) {
  .book-layout { grid-template-columns: 1fr; gap: 48px; }
  .book-info { position: static; order: 2; }
  #wizard { order: 1; }
  #book { padding: 64px 20px; }
}

/* ── WIZARD ── */
.wiz-steps { display: flex; align-items: center; gap: 8px; margin-bottom: 36px; flex-wrap: wrap; }
.wiz-step { display: flex; align-items: center; gap: 8px; }
.wiz-num { width: 21px; height: 21px; display: flex; align-items: center; justify-content: center; font-size: 9px; border: 1px solid; transition: all .3s; }
.wiz-num.active  { border-color: var(--gold); color: var(--gold); }
.wiz-num.done    { border-color: var(--gold); background: var(--gold); color: var(--black); }
.wiz-num.inactive{ border-color: var(--dark3); color: var(--dark3); }
.wiz-lbl { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; transition: color .3s; }
.wiz-lbl.active  { color: var(--gold); }
.wiz-lbl.done    { color: var(--muted); }
.wiz-lbl.inactive{ color: var(--dark3); }
.wiz-conn { height: 1px; width: 22px; transition: background .3s; }
.wiz-conn.done    { background: rgba(201,168,76,.4); }
.wiz-conn.inactive{ background: var(--dark3); }
.step-anim { animation: stepIn .3s cubic-bezier(.16,1,.3,1) forwards; }
@keyframes stepIn { from { opacity: 0; transform: translateX(14px); } to { opacity: 1; transform: translateX(0); } }
.step-h { font-family: var(--serif); font-size: 23px; font-weight: 300; margin-bottom: 5px; }
.step-sub { font-size: 12px; color: var(--muted); margin-bottom: 26px; }

/* ── Service pick ── */
.svc-pick-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
@media (max-width: 560px) { .svc-pick-grid { grid-template-columns: 1fr; } }
.svc-opt {
  border: 1px solid var(--border); padding: 18px; cursor: pointer;
  text-align: left; background: transparent; color: var(--text);
  position: relative; transition: all .2s; font-family: var(--sans);
}
.svc-opt:hover { border-color: #3a3a3a; }
.svc-opt.sel { border-color: rgba(201,168,76,.6); background: rgba(201,168,76,.04); }
.svc-opt .dot-sel { position: absolute; top: 10px; right: 10px; width: 7px; height: 7px; background: var(--gold); border-radius: 50%; display: none; }
.svc-opt.sel .dot-sel { display: block; }
.svc-opt .on { font-family: var(--serif); font-size: 16px; font-weight: 300; margin-bottom: 4px; transition: color .2s; }
.svc-opt:hover .on, .svc-opt.sel .on { color: rgba(201,168,76,.9); }
.svc-opt .od { font-size: 11px; color: var(--muted); line-height: 1.5; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.svc-opt .om { display: flex; align-items: center; justify-content: space-between; }
.svc-opt .odur { font-size: 10px; color: var(--muted); }
.svc-opt .oprice { font-size: 14px; color: var(--dim); transition: color .2s; }
.svc-opt.sel .oprice { color: var(--gold); }

/* ── Date picker ── */
.date-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.date-nav-label { font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); }
.date-nav-btns { display: flex; gap: 6px; }
.date-nav-btn {
  width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
  background: transparent; border: 1px solid var(--border); color: var(--dim);
  cursor: pointer; font-size: 16px; line-height: 1; transition: all .2s;
}
.date-nav-btn:hover { border-color: #444; color: var(--gold); }
.date-nav-btn:disabled { opacity: .3; cursor: not-allowed; }
.date-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 7px; margin-bottom: 26px; }
@media (max-width: 540px) { .date-grid { grid-template-columns: repeat(3,1fr); } }
.date-btn {
  display: flex; flex-direction: column; align-items: center; padding: 11px 5px;
  border: 1px solid var(--border); background: transparent; color: var(--dim);
  cursor: pointer; transition: all .2s; font-family: var(--sans);
}
.date-btn:hover { border-color: #444; color: var(--text); }
.date-btn.sel { border-color: rgba(201,168,76,.6); background: rgba(201,168,76,.05); }
.date-btn .dd { font-size: 9px; letter-spacing: .12em; text-transform: uppercase; margin-bottom: 4px; }
.date-btn .dn { font-size: 19px; font-weight: 300; font-family: var(--serif); }
.date-btn .dm { font-size: 9px; color: var(--muted); }
.date-btn.sel .dd, .date-btn.sel .dn { color: var(--gold); }

/* ── Time slots ── */
.slots-lbl { font-size: 10px; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.slots-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 7px; margin-bottom: 24px; }
@media (max-width: 460px) { .slots-grid { grid-template-columns: repeat(3,1fr); } }
.slot {
  padding: 10px 4px; font-size: 11px; font-family: var(--sans); text-align: center;
  border: 1px solid var(--border); background: transparent; color: var(--dim);
  cursor: pointer; transition: all .2s;
}
.slot:hover:not(:disabled) { border-color: #444; color: var(--text); }
.slot.sel { border-color: rgba(201,168,76,.6); background: rgba(201,168,76,.08); color: var(--gold); }
.slot:disabled { color: var(--dark3); text-decoration: line-through; cursor: not-allowed; border-color: rgba(42,42,42,.5); }

/* ── Booking summary bar ── */
.bsum {
  background: rgba(201,168,76,.05); border: 1px solid rgba(201,168,76,.18);
  padding: 14px 18px; display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px; animation: stepIn .3s ease;
}
.bsum .bs-name { font-family: var(--serif); font-size: 14px; color: var(--gold); }
.bsum .bs-when { font-size: 11px; color: var(--muted); margin-top: 2px; }
.bsum .bs-price { font-size: 16px; font-weight: 300; }

/* ── Mini summary ── */
.mini-sum { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; background: var(--dark); border: 1px solid var(--border); padding: 14px 16px; margin-bottom: 22px; }
.msi-label { font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: 3px; }
.msi-val { font-size: 12px; color: var(--text); font-weight: 300; }

/* ── Form ── */
.fgrp { margin-bottom: 18px; }
.flbl { display: block; font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: var(--muted); margin-bottom: 7px; }
.finp {
  width: 100%; background: transparent; border: 1px solid var(--border);
  color: var(--text); font-family: var(--sans); font-size: 14px;
  padding: 12px 14px; outline: none; transition: border-color .2s;
}
.finp:hover { border-color: #3c3c3c; }
.finp:focus { border-color: rgba(201,168,76,.55); }
.finp::placeholder { color: var(--dark3); }
.finp.err { border-color: rgba(248,113,113,.5); }
.ferr { font-size: 11px; color: #f87171; margin-top: 4px; display: none; }
.form-actions { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; }
.global-err { background: rgba(248,113,113,.07); border: 1px solid rgba(248,113,113,.2); color: #f87171; font-size: 12px; padding: 11px 14px; margin-bottom: 14px; display: none; }

/* ── Confirmation ── */
.confirm-wrap { text-align: center; padding: 12px 0; }
.confirm-icon { width: 64px; height: 64px; margin: 0 auto 22px; display: flex; align-items: center; justify-content: center; }
.confirm-icon svg { color: var(--gold); }
.check-path { stroke-dasharray: 120; stroke-dashoffset: 120; animation: drawCheck .6s ease forwards .15s; }
@keyframes drawCheck { to { stroke-dashoffset: 0; } }
.confirm-h { font-family: var(--serif); font-size: 28px; font-weight: 300; margin-bottom: 8px; }
.confirm-sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
.confirm-sub span { color: rgba(201,168,76,.8); }
.confirm-tbl { background: var(--dark); border: 1px solid var(--border); padding: 22px; margin-bottom: 28px; text-align: left; }
.confirm-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--dark2); font-size: 13px; }
.confirm-row:last-child { border-bottom: none; }
.cr-lbl { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
.cr-val { color: var(--text); font-weight: 300; }

/* ── Footer ── */
footer {
  border-top: 1px solid var(--dark2); padding: 32px 40px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 14px;
}
.foot-logo { display: flex; align-items: center; gap: 8px; font-family: var(--serif); font-size: 13px; font-weight: 300; color: var(--muted); }
.foot-logo .scissors { color: rgba(201,168,76,.5); }
.foot-copy { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--dark3); }
.foot-admin { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--dark3); background: none; border: none; cursor: pointer; transition: color .2s; }
.foot-admin:hover { color: rgba(201,168,76,.55); }
@media (max-width: 600px) { footer { padding: 24px 20px; } }

/* ── Admin overlay ── */
#admin-overlay { position: fixed; inset: 0; z-index: 200; background: var(--black); overflow-y: auto; display: none; }
#admin-overlay.open { display: block; animation: fadeIn .22s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.adm-hdr {
  position: sticky; top: 0; background: var(--black); border-bottom: 1px solid var(--border);
  padding: 0 40px; height: 64px; display: flex; align-items: center; justify-content: space-between; z-index: 10;
}
.adm-hdr-l { display: flex; align-items: center; gap: 10px; }
.adm-badge { font-size: 10px; letter-spacing: .28em; text-transform: uppercase; color: var(--gold); }
.adm-sep { width: 1px; height: 18px; background: var(--border); }
.adm-htitle { font-family: var(--serif); font-size: 16px; font-weight: 300; }
.adm-close { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: transparent; border: 1px solid var(--border); color: var(--dim); cursor: pointer; font-size: 17px; line-height: 1; transition: all .2s; }
.adm-close:hover { border-color: #444; color: var(--text); }
.adm-body { padding: 36px 40px; max-width: 1200px; margin: 0 auto; }
@media (max-width: 640px) { .adm-hdr, .adm-body { padding-left: 20px; padding-right: 20px; } }
.adm-stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 28px; }
@media (max-width: 600px) { .adm-stats { grid-template-columns: repeat(2,1fr); } }
.stat-box { background: var(--dark); border: 1px solid var(--border); padding: 18px; }
.stat-lbl { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
.stat-val { font-family: var(--serif); font-size: 28px; font-weight: 300; color: var(--text); }
.stat-val.gold { color: var(--gold); }
.stat-val.green { color: #4ade80; }
.adm-ctrl { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.adm-search { flex: 1; min-width: 200px; position: relative; }
.adm-search input { width: 100%; background: transparent; border: 1px solid var(--border); color: var(--text); font-family: var(--sans); font-size: 13px; padding: 10px 14px 10px 36px; outline: none; transition: border-color .2s; }
.adm-search input:focus { border-color: #444; }
.adm-search input::placeholder { color: var(--muted); }
.adm-search .si { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); }
.flt-btns { display: flex; gap: 6px; }
.flt-btn { padding: 10px 14px; font-size: 10px; font-family: var(--sans); letter-spacing: .14em; text-transform: uppercase; background: transparent; border: 1px solid var(--border); color: var(--muted); cursor: pointer; transition: all .2s; }
.flt-btn:hover { border-color: #444; color: var(--text); }
.flt-btn.on { border-color: rgba(201,168,76,.5); color: var(--gold); background: rgba(201,168,76,.05); }
.adm-tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { text-align: left; font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); font-weight: 400; padding: 0 14px 12px 0; border-bottom: 1px solid var(--border); white-space: nowrap; }
tbody tr { border-bottom: 1px solid var(--dark2); transition: background .15s; }
tbody tr:hover { background: rgba(255,255,255,.015); }
tbody td { padding: 14px 14px 14px 0; color: var(--dim); white-space: nowrap; }
.td-name { color: var(--text); font-weight: 300; }
.td-email { font-size: 11px; color: var(--muted); margin-top: 2px; }
.status-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; letter-spacing: .1em; text-transform: uppercase; padding: 4px 10px; border: 1px solid; }
.status-badge.confirmed { border-color: rgba(74,222,128,.3); color: #4ade80; background: rgba(74,222,128,.05); }
.status-badge.cancelled { border-color: var(--border); color: var(--muted); }
.sdot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.empty-st { text-align: center; padding: 70px 20px; color: var(--muted); font-size: 13px; }

/* ── Login modal ── */
#login-modal { position: fixed; inset: 0; z-index: 300; display: none; align-items: center; justify-content: center; padding: 24px; }
#login-modal.open { display: flex; }
.modal-bg { position: absolute; inset: 0; background: rgba(0,0,0,.86); backdrop-filter: blur(10px); }

function save() { localStorage.setItem('lbs', JSON.stringify(S.bookings)); }
function uid()  { return Date.now().toString(36).toUpperCase() + Math.random().toString(36).slice(2,6).toUpperCase(); }

function fmtDate(s) {
  if (!s) return '';
  const loc = S.lang === 'sl' ? 'sl-SI' : 'en-US';
  return new Date(s + 'T00:00:00').toLocaleDateString(loc, { weekday:'long', month:'long', day:'numeric', year:'numeric' });
}
function shortDate(s) {
  if (!s) return '';
  const loc = S.lang === 'sl' ? 'sl-SI' : 'en-US';
  return new Date(s + 'T00:00:00').toLocaleDateString(loc, { month:'short', day:'numeric', year:'numeric' });
}
function fmtTime(tm) {
  if (!tm) return '';
  const [h, m] = tm.split(':').map(Number);
  if (S.lang === 'sl') return `${h}:${String(m).padStart(2,'0')}`;
  const ap = h >= 12 ? 'PM' : 'AM';
  const hr = h > 12 ? h - 12 : h === 0 ? 12 : h;
  return `${hr}:${String(m).padStart(2,'0')} ${ap}`;
}

function allSlots() {
  const out = [];
  for (let h = 9; h < 19; h++) {
    for (const m of [0, 30]) {
      const time = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      out.push({ time, label: fmtTime(time) });
    }
  }
  return out;
}

function bookedOn(date) {
  // Merge Google Calendar busy slots with any locally-stored confirmed bookings
  const calSet   = new Set(S.calBusy[date] || []);
  const localSet = new Set(S.bookings.filter(b => b.date === date && b.status === 'confirmed').map(b => b.time));
  return new Set([...calSet, ...localSet]);
}

function weekDays() {
  const today = new Date(); today.setHours(0,0,0,0);
  const all = []; const d = new Date(today);
  for (let i = 0; i < 90; i++) {
    if (d.getDay() !== 0) all.push(new Date(d));
    d.setDate(d.getDate() + 1);
  }
  return all.slice(S.wkOff * 6, S.wkOff * 6 + 6);
}

function svcByIdIdx(id) { return SERVICES.findIndex(s => s.id === id); }

const STEP_KEYS = ['service','datetime','details'];

function stepIndicator() {
  const idx = STEP_KEYS.indexOf(S.step);
  const labels = t().stepLabels;
  return `<div class="wiz-steps">${STEP_KEYS.map((k,i) => {
    const cls = i < idx ? 'done' : i === idx ? 'active' : 'inactive';
    return `
      <div class="wiz-step">
        <div class="wiz-num ${cls}">${i < idx ? '✓' : i+1}</div>
        <span class="wiz-lbl ${cls}">${labels[i]}</span>
      </div>
      ${i < STEP_KEYS.length-1 ? `<div class="wiz-conn ${i < idx ? 'done' : 'inactive'}"></div>` : ''}`;
  }).join('')}</div>`;
}

function renderServiceStep() {
  const l = t();
  return `<div class="step-anim">
    ${stepIndicator()}
    <h2 class="step-h serif">${l.chooseH}</h2>
    <p class="step-sub">${l.chooseSub}</p>
    <div class="svc-pick-grid">
      ${SERVICES.map((sv,i) => `
        <button class="svc-opt${S.service?.id === sv.id ? ' sel' : ''}" onclick="pickService('${sv.id}')">
          <div class="dot-sel"></div>
          <div class="on">${svcName(i)}</div>
          <div class="od">${svcDesc(i)}</div>
          <div class="om">
            <span class="odur">⏱ ${sv.dur} min</span>
            <span class="oprice">$${sv.price}</span>
          </div>
        </button>`).join('')}
    </div>
    <div style="display:flex;justify-content:flex-end;">
      <button class="btn-gold" onclick="goNext()" ${!S.service ? 'disabled' : ''}>${l.btnCont}</button>
    </div>
  </div>`;
}

function renderDateTimeStep() {
  const l = t();
  const days  = weekDays();
  const taken = S.date ? bookedOn(S.date) : new Set();
  const slots = allSlots();
  const loc   = S.lang === 'sl' ? 'sl-SI' : 'en-US';
  return `<div class="step-anim">
    ${stepIndicator()}
    <h2 class="step-h serif">${l.dateH}</h2>
    <p class="step-sub">${l.dateSub}</p>
    <div class="date-nav">
      <span class="date-nav-label">${l.selDate}</span>
      <div class="date-nav-btns">
        <button class="date-nav-btn" onclick="prevWk()" ${S.wkOff===0?'disabled':''}>‹</button>
        <button class="date-nav-btn" onclick="nextWk()">›</button>
      </div>
    </div>
    <div class="date-grid">
      ${days.map(d => {
        const str = d.toISOString().split('T')[0];
        const dow = d.toLocaleDateString(loc,{weekday:'short'});
        const mon = d.toLocaleDateString(loc,{month:'short'});
        return `<button class="date-btn${S.date===str?' sel':''}" onclick="pickDate('${str}')">
          <span class="dd">${dow}</span>
          <span class="dn">${d.getDate()}</span>
          <span class="dm">${mon}</span>
        </button>`;
      }).join('')}
    </div>
    ${S.date ? `
      <div class="slots-lbl">${l.avail}</div>
      ${S.loadingSlots
        ? '<div style="padding:22px 0;text-align:center"><span class="spin" style="width:18px;height:18px;border-width:2px"></span></div>'
        : `<div class="slots-grid">
            ${slots.map(sl => `
              <button class="slot${S.time===sl.time?' sel':''}" ${taken.has(sl.time)?'disabled':''} onclick="pickTime('${sl.time}')">
                ${sl.label}
              </button>`).join('')}
           </div>`
      }` : ''}
    ${S.service && S.date && S.time ? `
      <div class="bsum">
        <div>
          <div class="bs-name">${svcName(svcByIdIdx(S.service.id))}</div>
          <div class="bs-when">${shortDate(S.date)} · ${fmtTime(S.time)}</div>
        </div>
        <div class="bs-price">$${S.service.price}</div>
      </div>` : ''}
    <div class="form-actions">
      <button class="btn-ghost" onclick="goBack()">${l.btnBack}</button>
      <button class="btn-gold" onclick="goNext()" ${!S.date||!S.time?'disabled':''}>${l.btnCont}</button>
    </div>
  </div>`;
}

function renderDetailsStep() {
  const l = t();
  const idx = svcByIdIdx(S.service?.id);
  return `<div class="step-anim">
    ${stepIndicator()}
    <h2 class="step-h serif">${l.detailsH}</h2>
    <p class="step-sub">${l.detailsSub}</p>
    <div class="mini-sum">
      <div><div class="msi-label">${l.sName}</div><div class="msi-val">${svcName(idx)}</div></div>
      <div><div class="msi-label">${l.sDate}</div><div class="msi-val">${shortDate(S.date)}</div></div>
      <div><div class="msi-label">${l.sTime}</div><div class="msi-val">${fmtTime(S.time)}</div></div>
    </div>
    <div id="gerr" class="global-err"></div>
    <div class="fgrp">
      <label class="flbl" for="fn">${l.nameLbl}</label>
      <input id="fn" class="finp" type="text" placeholder="${l.namePh}" value="${S.name}" oninput="S.name=this.value" autocomplete="name">
      <div id="en" class="ferr">${l.errName}</div>
    </div>
    <div class="fgrp">
      <label class="flbl" for="fe">${l.emailLbl}</label>
      <input id="fe" class="finp" type="email" placeholder="${l.emailPh}" value="${S.email}" oninput="S.email=this.value" autocomplete="email">
      <div id="ee" class="ferr">${l.errEmail}</div>
    </div>
    <div class="form-actions">
      <button class="btn-ghost" onclick="goBack()">${l.btnBack}</button>
      <button class="btn-gold" id="sub-btn" onclick="submitBooking()">${l.btnConfirm}</button>
    </div>
  </div>`;
}

function renderConfirmStep() {
  const b = S.done;
  if (!b) return '';
  const l   = t();
  const idx = svcByIdIdx(b.service);
  const nm  = idx >= 0 ? svcName(idx) : b.service;
  return `<div class="step-anim confirm-wrap">
    <div class="confirm-icon">
      <svg width="58" height="58" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <path class="check-path" d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
        <polyline class="check-path" points="22 4 12 14.01 9 11.01"/>
      </svg>
    </div>
    <h2 class="confirm-h serif">${l.confH}</h2>
    <p class="confirm-sub">${l.confSub} <span>${b.email}</span></p>
    <div class="confirm-tbl">
      ${[[l.crName,b.name],[l.crSvc,nm],[l.crDate,fmtDate(b.date)],[l.crTime,fmtTime(b.time)],[l.crPrice,'$'+b.price]]
        .map(([lb,v]) => `<div class="confirm-row"><span class="cr-lbl">${lb}</span><span class="cr-val">${v}</span></div>`)
        .join('')}
    </div>
    <button class="btn-gold" style="width:100%" onclick="resetWiz()">${l.bookAnother}</button>
  </div>`;
}

function renderWiz() {
  const el = $id('wizard');
  if (!el) return;
  switch(S.step) {
    case 'service':   el.innerHTML = renderServiceStep();   break;
    case 'datetime':  el.innerHTML = renderDateTimeStep();  break;
    case 'details':   el.innerHTML = renderDetailsStep();   break;
    case 'confirmed': el.innerHTML = renderConfirmStep();   break;
  }
}

/* ═══════════════════════════════════
   WIZARD ACTIONS
═══════════════════════════════════ */
function pickService(id) {
  const idx = SERVICES.findIndex(s => s.id === id);
  S.service = { ...SERVICES[idx] };
  renderWiz();
}
async function pickDate(d) {
  S.date = d; S.time = null;
  // Fetch availability from Google Calendar if we haven't cached this date yet
  if (!S.calBusy[d]) {
    S.loadingSlots = true;
    renderWiz(); // show spinner immediately
    try {
      const r = await fetch(`/api/calendar?date=${d}`);
      if (r.ok) {
        const data = await r.json();
        S.calBusy[d] = (data.slots || []).filter(s => s.busy).map(s => s.time);
      }
    } catch (e) {
      // API unavailable (local file open, env vars not set, etc.) — fall back to localStorage only
      console.warn('[calendar] GET failed, using local data only:', e.message);
      S.calBusy[d] = []; // cache empty so we don't retry on re-click
    }
    S.loadingSlots = false;
  }
  renderWiz();
}
function pickTime(tm) { S.time = tm; renderWiz(); }
function prevWk() { if (S.wkOff > 0) { S.wkOff--; renderWiz(); } }
function nextWk() { S.wkOff++; renderWiz(); }

function goNext() {
  if (S.step === 'service' && S.service)              { S.step = 'datetime'; renderWiz(); }
  else if (S.step === 'datetime' && S.date && S.time) { S.step = 'details';  renderWiz(); }
}
function goBack() {
  if (S.step === 'datetime') { S.step = 'service';  renderWiz(); }
  if (S.step === 'details')  { S.step = 'datetime'; renderWiz(); }
}

function validate() {
  const l = t();
  let ok = true;
  const fn=$id('fn'), fe=$id('fe'), en=$id('en'), ee=$id('ee');
  if (!S.name.trim() || S.name.trim().length < 2) { en.style.display='block'; fn.classList.add('err'); ok=false; }
  else { en.style.display='none'; fn.classList.remove('err'); }
  if (!S.email.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(S.email)) { ee.style.display='block'; fe.classList.add('err'); ok=false; }
  else { ee.style.display='none'; fe.classList.remove('err'); }
  return ok;
}

async function submitBooking() {
  if (!validate()) return;
  // Quick local conflict check before hitting the API
  const conflict = S.bookings.find(b => b.date===S.date && b.time===S.time && b.status==='confirmed');
  if (conflict) {
    const g=$id('gerr'); g.textContent=t().errSlot; g.style.display='block'; return;
  }

  const btn = $id('sub-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>';

  const idx = svcByIdIdx(S.service.id);
  const booking = {
    id: uid(), name: S.name.trim(), email: S.email.trim().toLowerCase(),
    service: S.service.id, date: S.date, time: S.time, price: S.service.price,
    status: 'confirmed', createdAt: new Date().toISOString(),
  };

  // Create event on Google Calendar (non-blocking — if it fails we still confirm locally)
  try {
    const r = await fetch('/api/calendar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: booking.name, email: booking.email,
        service: S.service.id, serviceName: svcName(idx),
        date: S.date, time: S.time,
        price: S.service.price, duration: S.service.dur,
      }),
    });
    if (r.ok) {
      const data = await r.json();
      booking.calEventId = data.eventId; // store for reference
    }
  } catch (e) {
    console.warn('[calendar] POST failed, booking saved locally only:', e.message);
  }

  // Invalidate the cache for this date so next visitor sees updated availability
  delete S.calBusy[S.date];

  S.bookings.push(booking); save();
  S.done = booking; S.step = 'confirmed'; renderWiz();
}

function resetWiz() {
  Object.assign(S, { step:'service', service:null, date:null, time:null, wkOff:0, name:'', email:'', done:null });
  renderWiz();
}

/* ═══════════════════════════════════
   ADMIN
═══════════════════════════════════ */
function openAdminLogin() {
  $id('login-modal').classList.add('open');
  setTimeout(() => $id('pw-inp')?.focus(), 80);
}
function closeLoginModal() {
  $id('login-modal').classList.remove('open');
  $id('pw-inp').value = '';
  $id('pw-err').style.display = 'none';
}
function loginAdmin() {
  if ($id('pw-inp').value === 'admin123') {
    closeLoginModal();
    S.bookings = JSON.parse(localStorage.getItem('lbs') || '[]');
    renderAdmStats();
    renderAdmLang();
    renderAdmTable();
    $id('admin-overlay').classList.add('open');
  } else {
    $id('pw-err').style.display = 'block';
    $id('pw-inp').select();
  }
}
function closeAdmin() { $id('admin-overlay').classList.remove('open'); }

function setFilter(f) {
  S.admFilt = f;
  ['all','confirmed','cancelled'].forEach(x => $id('f-'+x).classList.toggle('on', x===f));
  renderAdmTable();
}

function renderAdmStats() {
  const l    = t();
  const bs   = S.bookings;
  const conf = bs.filter(b => b.status==='confirmed');
  const today = new Date().toISOString().split('T')[0];
  $id('adm-stats').innerHTML = [
    { lbl:l.statTotal, val:bs.length,                                   cls:''      },
    { lbl:l.statConf,  val:conf.length,                                  cls:'green' },
    { lbl:l.statToday, val:conf.filter(b=>b.date===today).length,        cls:'gold'  },
    { lbl:l.statRev,   val:'$'+conf.reduce((s,b)=>s+b.price,0),          cls:'gold'  },
  ].map(x=>`<div class="stat-box"><div class="stat-lbl">${x.lbl}</div><div class="stat-val ${x.cls}">${x.val}</div></div>`).join('');
}

function renderAdmTable() {
  const l   = t();
  const q   = ($id('adm-q')?.value||'').toLowerCase();
  const f   = S.admFilt;
  const rows = S.bookings
    .filter(b => {
      const idx = svcByIdIdx(b.service);
      const nm  = idx >= 0 ? svcName(idx) : b.service;
      return (f==='all'||b.status===f) && (!q||[b.name,b.email,nm].some(v=>v.toLowerCase().includes(q)));
    })
    .sort((a,b)=>a.date.localeCompare(b.date)||a.time.localeCompare(b.time));

  const tbody=$id('adm-tbody'), empty=$id('adm-empty');
  if (!rows.length) { tbody.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';
  tbody.innerHTML = rows.map(b => {
    const idx = svcByIdIdx(b.service);
    const nm  = idx >= 0 ? svcName(idx) : b.service;
    const statusLabel = b.status === 'confirmed' ? l.admConf : l.admCanc;
    return `<tr>
      <td><div class="td-name">${b.name}</div><div class="td-email">${b.email}</div></td>
      <td>${nm}</td>
      <td>${shortDate(b.date)}</td>
      <td>${fmtTime(b.time)}</td>
      <td>$${b.price}</td>
      <td><span class="status-badge ${b.status}"><span class="sdot"></span>${statusLabel}</span></td>
      <td>${b.status==='confirmed'?`<button class="btn-danger" onclick="cancelBooking('${b.id}')">${l.admCanc}</button>`:''}</td>
    </tr>`;
  }).join('');
}

function cancelBooking(id) {
  const b = S.bookings.find(x=>x.id===id);
  if (!b || !confirm(t().cancelQ(b.name, shortDate(b.date), fmtTime(b.time)))) return;
  b.status='cancelled'; save();
  renderAdmStats(); renderAdmTable();
}

/* ═══════════════════════════════════
   REVEAL ON SCROLL
═══════════════════════════════════ */
function initReveal() {
  const obs = new IntersectionObserver(
    entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('vis'); }),
    { threshold: 0.1 }
  );
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
}

/* ═══════════════════════════════════
   INIT
═══════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  applyLang();
  renderWiz();
  initReveal();
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeLoginModal(); closeAdmin(); }
});
</script>
